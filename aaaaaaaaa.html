<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formatação de Texto</title>
</head>
<body style="font-family: Arial; background-color: #f4f4f4; color: black; background-image:url('robot-dance-baby-oil.png')">


<h1 style="background-color:red">não caguei nas calças e não estou borrado 😢</h1>


<p>
    <b style="color: pink;">caguei nas calças e estou borrado 😄 (b)</b><br>
    <!-- Apenas deixa o texto visualmente em negrito -->
    <!-- Boa prática: usar mais para estilo, não para importância -->
</p>

<p>
    <strong style="color:red">Texto importante (strong)</strong>
    <!-- Indica importância semântica -->
    <!-- Boa prática: preferir ao invés de <b> quando o conteúdo for relevante -->
</p>

<p>
    <i style="color: azure;">Texto em itálico (i)</i>
    <!-- Apenas muda o estilo visual -->
    <!-- Usado para palavras estrangeiras ou termos específicos -->
</p>

<p>
    <em style="color: burlywood;">Texto enfatizado (em)</em>
    <!-- Dá ênfase semântica -->
    <!-- Boa prática: melhor que <i> quando quiser destacar significado -->
</p>

<p>
    <mark style="color: antiquewhite;">Texto marcado (mark)</mark>
    <!-- Destaca como se fosse marca-texto -->
</p>

<p>
    <small style="color: crimson;">Texto menor (small)</small>
    <!-- Usado para observações ou detalhes menos importantes -->
</p>

<p>
    <del style="color: chartreuse;">Texto removido (del)</del>
    <!-- Representa algo que foi apagado -->
    <!-- Muito usado em preços antigos ou revisões -->
</p>

<p>
    <ins style="background-color: salmon;">Texto inserido (ins)</ins>
    <!-- Representa algo que foi adicionado -->
    <!-- Geralmente aparece sublinhado -->
</p>

<p>
    H<sub style="height: 4000;">zero</sub>O
    <!-- Subscript (sub) -->
    <!-- Texto abaixo da linha (ex: fórmulas químicas) -->
</p>

<p>
    x<sup style="background-color: aliceblue;">2</sup>
    <!-- Superscript (sup) -->
    <!-- Texto acima da linha (ex: potências matemáticas) -->
</p>

</body>

</html>
