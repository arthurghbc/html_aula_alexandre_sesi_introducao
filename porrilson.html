<!DOCTYPE html>
<!-- Define que o documento usa HTML5 -->
<!-- Boa prática: sempre declarar o DOCTYPE para evitar comportamentos inconsistentes no navegador -->

<html lang="en">
<!-- Início do HTML -->
<!-- Boa prática: definir o idioma ajuda acessibilidade, SEO e leitores de tela -->

<head>
    <!-- Área de configurações (não aparece na tela) -->
    <!-- Boa prática: tudo que configura o comportamento da página fica aqui -->

    <meta charset="UTF-8">
    <!-- Define o padrão de caracteres -->
    <!-- Por que usar: evita erros com acentos (ex: "ç", "ã") -->
    <!-- Boa prática: sempre incluir para garantir compatibilidade -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Controla como a página se adapta a telas diferentes -->
    <!-- Por que usar: sem isso, o site fica "quebrado" em celulares -->
    <!-- Boa prática: essencial para responsividade -->

    <title>kguei naz klças e stou borrado</title>
    <!-- Nome da aba do navegador -->
    <!-- Boa prática: usar títulos descritivos (melhora SEO e organização) -->

</head>

<body style="background-color: aqua; background-image:url()">
    <!-- Corpo da página (conteúdo visível) -->
    <!-- Boa prática: tudo que aparece deve estar dentro de um único <body> -->
    <!-- Por que: o navegador espera um único corpo; múltiplos podem causar erros -->

    <h1 style="color: rgb(252, 0, 0);font-family:cursive;font-size: 30px">E</h1>
    <!-- Título principal (mais importante da página) -->
    <!-- Boa prática: usar apenas um <h1> por página para organização semântica -->
    <!-- Observação: está vazio, então não aparece nada -->

    <h2 style="font-size: larger;">O</h2>
    <!-- Subtítulo -->
    <!-- Boa prática: usar em ordem (h1 -> h2 -> h3...) sem pular níveis -->

    <h3 style="font-style: oblique;">CABA</h3>
    <!-- Título de nível 3 -->

    <h4 style="color: antiquewhite;">VAI</h4>
    <!-- Título de nível 4 -->

    <h5 style="border: 10;">ENDOIDA</h5>
    <!-- Título de nível 5 -->

    <h6>É?</h6>
    <!-- Título de nível 6 (menos importante) -->

    <P>cavalos vários cavalos</P>
    <!-- Parágrafo de texto -->
    <!-- Boa prática: usar para blocos de texto -->
    <!-- Observação: tag normalmente escrita em minúsculo (<p>) por padrão -->
    <!-- Está vazio, então não exibe conteúdo -->

</body>
<!-- Boa prática: sempre fechar corretamente as tags -->

</html>
<!-- Final do documento HTML -->
